# ==============================================================================
# Core
# ==============================================================================

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB:Ss=\\E[%p1%d q:Se=\\E[2 q"
set -gq allow-passthrough on
set -s escape-time 0

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g mouse on

set -g mode-keys vi
# ==============================================================================
# Prefix
# ==============================================================================

set -g prefix C-b
unbind C-b
bind C-b send-prefix

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ==============================================================================
# Panes & Windows
# ==============================================================================

unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r m resize-pane -Z   # toggle maximize
bind x kill-pane           # no confirm

bind n command-prompt "new-session -s '%%'"

# ==============================================================================
# Copy mode
# ==============================================================================

bind v copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ==============================================================================
# Popups
# ==============================================================================

bind C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "$SHELL -l"
bind C-g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind C-b display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "mactop"    

bind d display-menu -T "#[align=centre]Dotfiles" -x C -y C \
    ".zshrc"      z "display-popup -w 85% -h 85% -E 'nvim ~/.zshrc'"                  \
    ".zprofile"   p "display-popup -w 85% -h 85% -E 'nvim ~/.zprofile'"               \
    ".tmux.conf"  t "display-popup -w 85% -h 85% -E 'nvim ~/dotfiles/tmux/.tmux.conf'" \
    ".nvim"       v "display-popup -w 90% -h 90% -E 'nvim ~/.config/nvim'"            \
    "quit"        q ""


# sesh w/ (tmux fzf)
bind-key o run-shell "sesh connect \"$(
        sesh list --icons | fzf-tmux -p 90%,80% \
        --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
        --header '🔑 ^a all | ^t tmux | ^g conf | ^x zoxide | ^d tmux kill | ^f find' \
        --bind 'tab:down,btab:up' \
        --bind 'ctrl-a:change-prompt(🛸  )+reload(sesh list --icons)' \
        --bind 'ctrl-t:change-prompt(◧  )+reload(sesh list -t --icons)' \
        --bind 'ctrl-g:change-prompt(⛯  )+reload(sesh list -c --icons)' \
        --bind 'ctrl-x:change-prompt(🗃  )+reload(sesh list -z --icons)' \
        --bind 'ctrl-f:change-prompt(🔭  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
        --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(👽  )+reload(sesh list --icons)' \
        --preview-window 'right:55%' \
        --preview 'sesh preview {}'
)\""

# ==============================================================================
# Plugins
# ==============================================================================

set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/dotfiles/tmux/plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'  # C-h/j/k/l across nvim + tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'     # save sessions across reboots
set -g @plugin 'tmux-plugins/tmux-continuum'     # auto-save every 15min
set -g @plugin 'alexwforsythe/tmux-which-key'


set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

set -g @resurrect-dir '~/.local/share/tmux/resurrect'

# ==============================================================================
# Status bar
# ==============================================================================

set -g status on
set -g status-position bottom
set -g status-justify centre
set -g status-left-length 100
set -g status-right-length 100
set -g status-style "bg=#0f1117,fg=#908caa"


### =============== B/W ==================
# Base
set -g status-style "bg=#000000,fg=#d0d0d0"

# Left
set -g status-left ""
set -ga status-left "#{?client_prefix,#[fg=#ffffff,bold] #S ,#[fg=#a0a0a0,bold] #S }"
set -ga status-left "#[fg=#888888] #{=/-30/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[fg=#cccccc]#{?window_zoomed_flag, │ zoom ,}"

# Right
set -g status-right ""
set -ga status-right "#[fg=#aaaaaa] %H:%M "


# Windows
set -g window-status-style          "fg=#666666,bg=#000000"
set -g window-status-last-style     "fg=#bbbbbb,bg=#000000"
set -g window-status-current-style  "fg=#ffffff,bg=#222222,bold"
set -g window-status-activity-style "fg=#000000,bg=#ffffff"
set -g window-status-bell-style     "fg=#000000,bg=#ffffff,bold"

